name: Daily Multi-Source Paper Monitor

on:
  schedule:
    # 每天北京时间 9:00 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests openpyxl pdfplumber
    
    - name: Run Multi-Source Monitor
      env:
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
      run: |
        echo "🚀 Starting Multi-Source Paper Monitor..."
        echo "📅 Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo ""
        echo "📊 Sources: arXiv + Scopus"
        echo ""
        
        # 运行监控脚本
        python multi_source_monitor.py
        
        echo ""
        echo "✅ Monitor completed"
    
    - name: Commit and push if there are changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -A
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "chore: update papers and viewer data $(date -u +%Y-%m-%d)"
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
