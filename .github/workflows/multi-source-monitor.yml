name: Daily Multi-Source Paper Monitor

on:
  schedule:
    # 每天北京时间 9:00 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests openpyxl pdfplumber
    
    - name: Run Multi-Source Monitor
      env:
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        WEB_OF_SCIENCE_API_KEY: ${{ secrets.WEB_OF_SCIENCE_API_KEY }}
      run: |
        echo "🚀 Starting Multi-Source Paper Monitor..."
        echo "📅 Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo ""
        
        # 运行监控脚本
        python multi_source_monitor.py
        
        echo ""
        echo "✅ Monitor completed"
    
    - name: Upload paper records (if any)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: paper-records-${{ github.run_id }}
        path: |
          papers/
          crawled_ids.txt
        retention-days: 30
